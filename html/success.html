<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand eCommerce - Order Success</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .success-page {
            padding: 80px 20px;
            text-align: center;
            max-width: 600px;
            margin: 0 auto;
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background-color: #e6f4ea;
            color: var(--success);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 20px auto;
        }
        .success-title {
            font-size: 28px;
            margin-bottom: 10px;
            color: var(--text-dark);
        }
        .success-desc {
            color: var(--text-light);
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .order-number {
            font-weight: 700;
            color: var(--text-dark);
        }
        .success-actions a {
            display: inline-block;
            padding: 12px 30px;
            border-radius: var(--radius-md);
            font-weight: 600;
            text-decoration: none;
            transition: all var(--transition-speed);
        }
        .btn-home {
            background-color: var(--primary-color);
            color: var(--white);
            margin-right: 15px;
        }
        .btn-home:hover {
            background-color: var(--primary-hover);
        }
        .btn-orders {
            background-color: var(--bg-light);
            color: var(--text-dark);
            border: 1px solid var(--border-color);
        }
        .btn-orders:hover {
            background-color: var(--border-color);
        }
    </style>
</head>
<body>

    <div class="header-wrapper">
        <header class="header">
            <div class="container" style="justify-content:center;">
                <a href="index.html" class="logo">
                    <svg width="32" height="32" viewBox="0 0 24 24">
                        <path d="M19 6h-2c0-2.76-2.24-5-5-5S7 3.24 7 6H5c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-7-3c1.66 0 3 1.34 3 3H9c0-1.66 1.34-3 3-3zm7 17H5V8h14v12zm-7-8c-1.66 0-3-1.34-3-3H7c0 2.76 2.24 5 5 5s5-2.24 5-5h-2c0 1.66-1.34 3-3 3z"/>
                    </svg>
                    Brand
                </a>
            </div>
        </header>
    </div>

    <!-- Main Content -->
    <main class="container">
        <div class="success-page">
            <div class="success-icon">✓</div>
            <h1 class="success-title">Order Placed Successfully!</h1>
            <p class="success-desc">
                Thank you for your purchase. Your order <span class="order-number">#ORD-2026-90812</span> has been confirmed. 
                We have sent an order confirmation email with the details.
            </p>
            <div class="success-actions">
                <a href="index.html" class="btn-home">Back to Home</a>
                <a href="#" class="btn-orders">View Orders</a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                &copy; 2026 Brand eCommerce. All rights reserved.
            </div>
        </div>
    </footer>

</body>
</html>
