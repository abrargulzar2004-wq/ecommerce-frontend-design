<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand eCommerce - Checkout</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/checkout.css">
</head>
<body>

    <div class="header-wrapper">
        <header class="header">
            <div class="container">
                <a href="index.html" class="logo">
                    <svg width="32" height="32" viewBox="0 0 24 24">
                        <path d="M19 6h-2c0-2.76-2.24-5-5-5S7 3.24 7 6H5c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-7-3c1.66 0 3 1.34 3 3H9c0-1.66 1.34-3 3-3zm7 17H5V8h14v12zm-7-8c-1.66 0-3-1.34-3-3H7c0 2.76 2.24 5 5 5s5-2.24 5-5h-2c0 1.66-1.34 3-3 3z"/>
                    </svg>
                    Brand
                </a>
                <div style="font-weight:600; font-size:18px;">Secure Checkout</div>
            </div>
        </header>
    </div>

    <!-- Main Content -->
    <main class="container">
        <!-- Breadcrumb -->
        <div style="padding: 20px 0; color: var(--text-light); font-size: 14px;">
            <a href="cart.html">Cart</a> > <span>Checkout</span>
        </div>

        <form class="checkout-page" action="success.html" method="GET">
            <div class="checkout-form">
                <h2 class="section-title">Shipping Information</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" required placeholder="John">
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" required placeholder="Doe">
                    </div>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label>Street Address</label>
                    <input type="text" required placeholder="123 Main St">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>City</label>
                        <input type="text" required placeholder="New York">
                    </div>
                    <div class="form-group">
                        <label>Zip Code</label>
                        <input type="text" required placeholder="10001">
                    </div>
                </div>

                <h2 class="section-title" style="margin-top:20px;">Payment Method</h2>
                <label class="payment-method">
                    <input type="radio" name="payment" checked>
                    <strong>Credit Card</strong>
                </label>
                <label class="payment-method">
                    <input type="radio" name="payment">
                    <strong>PayPal</strong>
                </label>
                <div class="form-group">
                    <label>Card Number</label>
                    <input type="text" required placeholder="0000 0000 0000 0000">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Expiry Date</label>
                        <input type="text" required placeholder="MM/YY">
                    </div>
                    <div class="form-group">
                        <label>CVV</label>
                        <input type="text" required placeholder="123">
                    </div>
                </div>
            </div>

            <div class="checkout-summary" id="checkoutSummaryBox">
                <h2 class="section-title">Order Summary</h2>
                <div style="margin-bottom:15px;">
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <span style="color:var(--text-light)">0 Items</span>
                        <span>$0.00</span>
                    </div>
                </div>
                <button type="submit" class="place-order-btn">Place Order</button>
            </div>
        </form>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                &copy; 2026 Brand eCommerce. Secure Checkout.
            </div>
        </div>
    </footer>

    <script src="../js/main.js"></script>
</body>
</html>
