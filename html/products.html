<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand eCommerce - Products</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/products.css">
    <link rel="stylesheet" href="../css/home.css"> <!-- for product card base styles -->
</head>
<body>

    <div class="header-wrapper">
        <header class="header">
            <div class="container">
                <div class="mobile-menu-toggle" id="mobileMenuBtn">☰</div>
                <a href="index.html" class="logo">
                    <svg width="32" height="32" viewBox="0 0 24 24">
                        <path d="M19 6h-2c0-2.76-2.24-5-5-5S7 3.24 7 6H5c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-7-3c1.66 0 3 1.34 3 3H9c0-1.66 1.34-3 3-3zm7 17H5V8h14v12zm-7-8c-1.66 0-3-1.34-3-3H7c0 2.76 2.24 5 5 5s5-2.24 5-5h-2c0 1.66-1.34 3-3 3z"/>
                    </svg>
                    Brand
                </a>
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Search for items...">
                    <button type="button" id="searchBtn">Search</button>
                </div>
                <div class="header-actions">
                    <a href="#" class="action-item">
                        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                        <span>Profile</span>
                    </a>
                    <a href="#" class="action-item">
                        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 14H5.17L4 17.17V4h14v12z"/></svg>
                        <span>Message</span>
                    </a>
                    <a href="cart.html" class="action-item">
                        <div style="position: relative;">
                            <svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
                            <span class="cart-badge" id="cartBadgeCount">0</span>
                        </div>
                        <span>My cart</span>
                    </a>
                </div>
            </div>
        </header>

        <nav class="navbar" id="mainNav">
            <div class="container">
                <a href="categories.html" class="nav-link">Categories</a>
                <a href="products.html" class="nav-link" style="color:var(--accent-color);">Products</a>
                <a href="products.html" class="nav-link">Hot offers</a>
                <a href="products.html" class="nav-link">Gift boxes</a>
                <a href="#" class="nav-link">About</a>
                <a href="#" class="nav-link">Contact</a>
                <a href="#" class="nav-link">Help Center</a>
            </div>
        </nav>
    </div>

    <!-- Main Content -->
    <main class="container">
        <!-- Breadcrumb -->
        <div style="padding: 20px 0; color: var(--text-light); font-size: 14px;">
            <a href="index.html">Home</a> > <a href="categories.html">Categories</a> > <span>All Products</span>
        </div>

        <div class="products-page">
            <!-- Sidebar Filters -->
            <aside class="sidebar">
                <div class="filter-group">
                    <div class="filter-title">Category <span>&#9662;</span></div>
                    <div class="filter-list" id="categoryFilters">
                        <label class="filter-item"><input type="checkbox" value="Electronics"> Electronics</label>
                        <label class="filter-item"><input type="checkbox" value="Clothing"> Clothing</label>
                        <label class="filter-item"><input type="checkbox" value="Accessories"> Accessories</label>
                        <label class="filter-item"><input type="checkbox" value="Home"> Home</label>
                    </div>
                </div>

                <div class="filter-group">
                    <div class="filter-title">Price range <span>&#9662;</span></div>
                    <div class="price-inputs">
                        <input type="number" id="minPrice" placeholder="Min" value="0">
                        <span>-</span>
                        <input type="number" id="maxPrice" placeholder="Max" value="2000">
                    </div>
                    <button class="apply-btn" onclick="applyFilters()">Apply Filters</button>
                </div>
            </aside>

            <!-- Products Grid Area -->
            <section class="products-content">
                <div class="products-header">
                    <div class="products-count">Showing <strong id="productCountLabel">12 items</strong></div>
                    <div class="products-sort">
                        <select id="sortSelect" onchange="applyFilters()">
                            <option value="featured">Featured</option>
                            <option value="low-high">Price: Low to High</option>
                            <option value="high-low">Price: High to Low</option>
                        </select>
                    </div>
                </div>

                <div class="products-grid" id="productGridContainer">
                    <!-- Products rendered via JS -->
                </div>

                <div class="pagination">
                    <button class="page-btn">&lt;</button>
                    <button class="page-btn active">1</button>
                    <button class="page-btn">2</button>
                    <button class="page-btn">&gt;</button>
                </div>
            </section>
        </div>
    </main>

    <!-- Footer (Omitted content for brevity, same as index) -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                &copy; 2026 Brand eCommerce. All rights reserved.
            </div>
        </div>
    </footer>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="../js/main.js"></script>
    <script>
        // Inline JS specific to Products page rendering to handle expanding the catalog easily
        document.addEventListener('DOMContentLoaded', () => {
            renderProductsGrid();
        });
    </script>
</body>
</html>
